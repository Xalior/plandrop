  </main>

  <!-- theme-toggle:start — paired with the navbar toggle button. Only the
       dual-mode bootstrap5 skeleton keeps this; the generator strips this whole
       block for every single-appearance Bootswatch theme. Delegated on the
       document so it survives the self-update <body> swap; the chosen theme
       lives on <html>, which the swap never touches. No external dependency
       beyond Bootstrap's data-bs-theme. -->
  <script>
    document.addEventListener('click', function (event) {
      var trigger = event.target.closest('[data-bs-theme-toggle]');
      if (!trigger) {
        return;
      }
      var root = document.documentElement;
      var next = root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-bs-theme', next);
    });
  </script>
  <!-- theme-toggle:end -->
