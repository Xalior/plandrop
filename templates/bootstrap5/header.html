<!DOCTYPE html>
<html lang="en" data-bs-theme="light" data-plandrop-template="bootstrap5">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>plandrop document</title>
  <!-- Template assets are served from the shared theme tree (Apache Alias
       /.plandrop/ -> theme volume); links are concrete (bootstrap5), never
       "default", so changing the default later never breaks this document. -->
  <link rel="stylesheet" href=".plandrop/bootstrap5/css/bootstrap.min.css">
  <!-- plandrop's shared contrast layer; loaded after Bootstrap so it can
       harden dark-mode contrast for vanilla Bootstrap markup across themes. -->
  <link rel="stylesheet" href=".plandrop/bootstrap5/css/plandrop.css">
  <script defer src=".plandrop/bootstrap5/js/selfupdate.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand mb-0 h1" href="/">plandrop</a>
      <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-theme-toggle>
        Toggle light / dark
      </button>
    </div>
  </nav>
  <main class="container py-4">
