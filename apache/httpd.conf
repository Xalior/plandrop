ServerRoot "/usr/local/apache2"
# Listen on a configurable, unprivileged port so the container can run as a
# non-root user (compose `user:` from PLANDROP_UID/PLANDROP_GID). The value is
# interpolated from the container environment (set by docker-compose).
Listen ${PLANDROP_APACHE_PORT}

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule mime_module modules/mod_mime.so
LoadModule dir_module modules/mod_dir.so

LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authn_file_module modules/mod_authn_file.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_user_module modules/mod_authz_user.so
LoadModule auth_basic_module modules/mod_auth_basic.so

LoadModule dav_module modules/mod_dav.so
LoadModule dav_fs_module modules/mod_dav_fs.so
LoadModule vhost_alias_module modules/mod_vhost_alias.so

# Alias maps the shared /.plandrop/ path to the theme volume; autoindex lists
# tenant directories that have no index.html.
LoadModule alias_module modules/mod_alias.so
LoadModule autoindex_module modules/mod_autoindex.so

# No User/Group: the container runs as a non-root user chosen in compose, so
# Apache must not attempt to setuid (which requires root). DAV writes therefore
# happen as that configured UID, matching the data dir's host-side ownership.
ServerName localhost
UseCanonicalName Off

# Keep all runtime state out of the root-owned image dirs so a non-root user
# can start: pid file, lock DB, and mutexes go to writable locations.
PidFile "/tmp/httpd.pid"
DavLockDB "/tmp/DavLock"
Mutex posixsem
ErrorLog /proc/self/fd/2
LogLevel warn

# Serve correct Content-Type by extension, and answer a bare directory URL with
# index.html (the static-hosting contract relied on by the upload path).
TypesConfig conf/mime.types
DirectoryIndex index.html

<Directory />
    AllowOverride none
    Require all denied
</Directory>

<Directory "/srv/hosts">
    Require all granted
    # List directories with no index.html (B-04). Plain listing in this phase.
    Options +Indexes
</Directory>

# Operator drop-in templates from the separate user mount, served namespaced
# under /.plandrop/user/. Declared BEFORE the /.plandrop/ alias because mod_alias
# takes the first matching Alias, so the more specific prefix must come first.
Alias "/.plandrop/user/" "/srv/user-templates/"
<Directory "/srv/user-templates">
    Require all granted
    <LimitExcept GET HEAD OPTIONS>
        Require all denied
    </LimitExcept>
</Directory>

# Shared template assets, the same for every tenant. A published doc's relative
# .plandrop/<name>/... link resolves to /.plandrop/<name>/... on its host; this
# Alias maps that host-independent path to the read-only theme volume. mod_alias
# is matched before mod_vhost_alias's docroot, so it applies across all vhosts.
Alias "/.plandrop/" "/srv/templates/"
<Directory "/srv/templates">
    Require all granted
    # Read-only: the theme volume is mounted ro, and any write method is denied
    # here regardless (cross-tenant/anon writes surface as 401, as elsewhere).
    <LimitExcept GET HEAD OPTIONS>
        Require all denied
    </LimitExcept>
</Directory>

# One vhost serves every subdomain via a dynamic docroot. Served content lives
# one level below the per-vhost dir (/srv/hosts/%1), reserving that dir for
# future per-vhost metadata.
<VirtualHost *:${PLANDROP_APACHE_PORT}>
    VirtualDocumentRoot "/srv/hosts/%1/www"

    <Location "/">
        Dav On
        AuthType Basic
        AuthName "PlanDrop"
        AuthUserFile "/srv/auth/htpasswd"

        # Reads open to all; writes must be the tenant whose htpasswd username
        # equals the host label (the first Host component). This decouples the
        # domain from auth: the username is the bare label, not the full host.
        <LimitExcept GET HEAD OPTIONS>
            Require expr "%{HTTP_HOST} =~ /^([^.]+)/ && %{REMOTE_USER} == $1"
        </LimitExcept>
    </Location>

    # The shared theme path is read-only and not a DAV collection: reads are
    # open, every write method is denied (DAV PUT under /.plandrop/ -> 401),
    # overriding the tenant Dav gate inherited from <Location "/">.
    <Location "/.plandrop/">
        Dav Off
        <LimitExcept GET HEAD OPTIONS>
            Require all denied
        </LimitExcept>
    </Location>
</VirtualHost>
