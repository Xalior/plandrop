# plandrop stack. The Apache mod_dav host serves *.<domain> read-only and
# accepts per-tenant authed WebDAV writes; the control plane mints/manages hosts.
# Ingress/TLS is out of scope and reused (NPM or any SSL/HTTP ingress in front);
# these services speak plain HTTP behind it. The bind address is host-specific
# (PLANDROP_BIND in .env): 127.0.0.1 for local dev, the docker-bridge or tailnet
# IP where a front proxy can reach it in deployment.

# Project name — the prefix for containers/networks/volumes (e.g.
# plandrop-apache-1). Defaults to "plandrop" instead of the folder name;
# override with COMPOSE_PROJECT_NAME in your .env.
name: ${COMPOSE_PROJECT_NAME:-plandrop}

services:
  # The only publicly-reachable control entrypoint. Bundles the built-in
  # templates, seeds the shared theme volume fresh on boot, serves /.plandrop/*
  # statically, and reverse-proxies /api/* to the control plane. Coupled to and
  # versioned with the control plane as one managed unit.
  ingress:
    build:
      context: .
      dockerfile: Dockerfile.ingress
    restart: unless-stopped
    environment:
      PLANDROP_INGRESS_PORT: "${PLANDROP_INGRESS_PORT:-8082}"
      PLANDROP_THEME_DIR: /srv/templates
      PLANDROP_CONTROL_HOST: control
      PLANDROP_CONTROL_PORT: "${PLANDROP_CONTROL_PORT:-8081}"
    ports:
      # Plain HTTP — TLS/ingress terminate in front. The CLI targets this port.
      - "${PLANDROP_BIND:-127.0.0.1}:${PLANDROP_INGRESS_PORT:-8082}:${PLANDROP_INGRESS_PORT:-8082}"
    volumes:
      # Read-write: the entrypoint seeds the built-in templates here on boot.
      - "plandrop-templates:/srv/templates"
    depends_on:
      - control
    healthcheck:
      # The volume is seeded once the assembled starter exists.
      test:
        - CMD-SHELL
        - "test -f /srv/templates/bootstrap5/template.html"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  apache:
    image: httpd:2.4
    restart: unless-stopped
    # Run as the configured non-root user so DAV writes land as PLANDROP_UID,
    # matching the host-side ownership of the data tree (shared with the
    # control plane). Requires the unprivileged listen port below.
    user: "${PLANDROP_UID:-1000}:${PLANDROP_GID:-1000}"
    environment:
      # Apache interpolates ${PLANDROP_APACHE_PORT} in httpd.conf (Listen + vhost).
      PLANDROP_APACHE_PORT: "${PLANDROP_APACHE_PORT:-8080}"
    ports:
      # Plain HTTP — TLS/ingress terminate in front. Host and container share
      # the configured port; the bind address is host-specific (see .env).
      - "${PLANDROP_BIND:-127.0.0.1}:${PLANDROP_APACHE_PORT:-8080}:${PLANDROP_APACHE_PORT:-8080}"
    volumes:
      - "./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro"
      # Per-tenant content; DAV writes land here (read-write).
      - "${PLANDROP_DATA:-./data}/hosts:/srv/hosts"
      # Shared auth; read-only for Apache (the control plane writes it).
      - "${PLANDROP_DATA:-./data}/auth:/srv/auth:ro"
      # Shared template assets, read-only; served per-tenant under /.plandrop/.
      - "plandrop-templates:/srv/templates:ro"
    depends_on:
      ingress:
        condition: service_healthy

  control:
    build:
      context: .
      dockerfile: Dockerfile.control
    restart: unless-stopped
    # Privileged writer of the shared volume — runs as the configured user so
    # the files it creates are owned consistently with Apache's reads.
    user: "${PLANDROP_UID:-1000}:${PLANDROP_GID:-1000}"
    environment:
      PLANDROP_CONTROL_PORT: "${PLANDROP_CONTROL_PORT:-8081}"
      PLANDROP_HOSTS_DIR: /srv/hosts
      PLANDROP_AUTH_FILE: /srv/auth/htpasswd
      PLANDROP_THEME_DIR: /srv/templates
    # No published port: the control plane is internal-only, reachable only via
    # the ingress on the Docker network. It is never exposed to the public again.
    expose:
      - "${PLANDROP_CONTROL_PORT:-8081}"
    volumes:
      # Read-write: the control plane creates host dirs and writes htpasswd.
      - "${PLANDROP_DATA:-./data}/hosts:/srv/hosts"
      - "${PLANDROP_DATA:-./data}/auth:/srv/auth"
      # Shared template assets, read-only; enumerated for /api/templates.
      - "plandrop-templates:/srv/templates:ro"
    healthcheck:
      # node:24 ships a global fetch; any HTTP response means it is listening.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+process.env.PLANDROP_CONTROL_PORT).then(()=>process.exit(0),()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  # Built-in template assets, re-seeded fresh from the ingress image on every
  # boot. Ephemeral seed state, not operator data — operator templates are a
  # separate mount (a later phase) that the fresh seed never wipes.
  plandrop-templates:
