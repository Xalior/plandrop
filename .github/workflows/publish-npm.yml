# Publish the `plandrop` CLI to npm on a release tag, via OIDC Trusted Publishing
# (no stored token). Pairs with the GHCR image workflow on the same `v*` tags.
#
# One-time npm-side setup (npmjs.com -> package `plandrop` -> Settings ->
# Trusted Publisher):
#   Publisher:          GitHub Actions
#   Organization/user:  Xalior
#   Repository:         plandrop
#   Workflow filename:  publish-npm.yml   (this file)
#   Environment name:   (leave blank)
#   Allowed actions:    npm publish
#
# Auth is the short-lived GitHub OIDC token (`id-token: write`), exchanged by npm
# at publish time — there is no NPM_TOKEN secret to store or rotate. Trusted
# publishing also attaches build provenance automatically.
name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for the OIDC exchange + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4 # reads the version from package.json packageManager

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # match the engines floor + tsup target; build on the oldest supported Node
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Guard against a mistagged release: the tag (minus the leading v) must
      # equal package.json's version, or we'd publish the wrong number.
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # dist/ is not committed (files: ["dist"]); build it so npm has something
      # to pack.
      - name: Build
        run: pnpm run build

      # Trusted Publishing needs a recent npm (the OIDC exchange landed in
      # 11.5.1). setup-node's bundled npm may be older, so pin it forward.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      # No token: npm performs the OIDC exchange because id-token:write is set
      # and the run matches the trusted-publisher config above.
      - name: Publish
        run: npm publish --provenance --access public
